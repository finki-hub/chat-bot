name: finki-hub-chat-bot

networks:
  finki_stack:
    driver: bridge
    name: finki_stack
    # Set external to true to use an existing network
    # external: true

services:
  api:
    depends_on:
      db:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      API_KEY: ${API_KEY}
      CHAT_HISTORY_MAX_TURNS: ${CHAT_HISTORY_MAX_TURNS:-10}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_BASE_URL: ${GOOGLE_BASE_URL:-}
      GPU_API_URL: ${GPU_API_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      MCP_API_KEY: ${MCP_API_KEY}
      MCP_HTTP_URLS: ${MCP_HTTP_URLS}
      MCP_SSE_URLS: ${MCP_SSE_URLS}
      OLLAMA_URL: ${OLLAMA_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://eu.i.posthog.com}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      RERANKER_MIN_SCORE: ${RERANKER_MIN_SCORE:-0.1}
      TZ: ${TZ}
      WORKERS: ${WORKERS}
    image: ghcr.io/finki-hub/chat-bot-api:latest
    networks:
      - finki_stack
    ports:
      - "8880:8880"
    restart: unless-stopped

  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      TZ: ${TZ}
    healthcheck:
      interval: 10s
      retries: 5
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER
      timeout: 5s
    image: pgvector/pgvector:pg17
    networks:
      - finki_stack
    ports:
      - "${POSTGRES_PORT}:5432"
    restart: unless-stopped
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  gpu-api:
    environment:
      HF_HOME: /huggingface_cache
      LOG_LEVEL: ${LOG_LEVEL}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://eu.i.posthog.com}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      PRELOAD_BGEM3: ${PRELOAD_BGEM3}
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      TZ: ${TZ}
    gpus: all
    image: ghcr.io/finki-hub/chat-bot-gpu-api:latest
    networks:
      - finki_stack
    ports:
      - "8888:8888"
    restart: unless-stopped
    volumes:
      - ./hf_cache:/huggingface_cache

  pgadmin:
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      TZ: ${TZ}
    image: dpage/pgadmin4:latest
    networks:
      - finki_stack
    ports:
      - "5555:80"
    restart: unless-stopped
    volumes:
      - ./pgadmin:/var/lib/pgadmin

  web:
    depends_on:
      api:
        condition: service_started
    environment:
      API_BASE_URL: ${WEB_API_BASE_URL:-http://api:8880}
      CHAT_API_KEY: ${API_KEY}
      TZ: ${TZ}
    image: ghcr.io/finki-hub/chat-bot-web:latest
    networks:
      - finki_stack
    ports:
      - "3000:3000"
    restart: unless-stopped
