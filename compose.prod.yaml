name: finki-hub-chat-bot

networks:
  finki_stack:
    driver: bridge
    name: finki_stack
    # Set external to true to use an existing network
    # external: true

services:
  api:
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_KEY: ${API_KEY:?API_KEY is required}
      BYOK_ALLOWED_BASE_URLS: ${BYOK_ALLOWED_BASE_URLS:-}
      CHAT_HISTORY_MAX_TURNS: ${CHAT_HISTORY_MAX_TURNS:-10}
      DATABASE_POOL_MAX_SIZE: ${DATABASE_POOL_MAX_SIZE:-10}
      DATABASE_POOL_MIN_SIZE: ${DATABASE_POOL_MIN_SIZE:-1}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      GPU_API_URL: ${GPU_API_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      MCP_API_KEY: ${MCP_API_KEY:-}
      MCP_HTTP_URLS: ${MCP_HTTP_URLS:-}
      MCP_SERVERS: ${MCP_SERVERS:-[]}
      MCP_SSE_URLS: ${MCP_SSE_URLS:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://eu.i.posthog.com}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      RERANKER_MIN_SCORE: ${RERANKER_MIN_SCORE:-0.1}
      SOURCE_RERANKER_MIN_SCORE: ${SOURCE_RERANKER_MIN_SCORE:-0.3}
      # Sponsored model settings are API-only and fail closed unless explicitly enabled.
      # Never expose the sponsored key or endpoint through the web service.
      SPONSORED_MODEL_ENABLED: ${SPONSORED_MODEL_ENABLED:-false}
      SPONSORED_MODEL_ID: ${SPONSORED_MODEL_ID:-gpt-5.6-luna}
      SPONSORED_MODEL_PROVIDER: ${SPONSORED_MODEL_PROVIDER:-openai}
      SPONSORED_MODEL_API_KEY: ${SPONSORED_MODEL_API_KEY:-}
      SPONSORED_MODEL_BASE_URL: ${SPONSORED_MODEL_BASE_URL:-}
      SPONSORED_MODEL_UPSTREAM_MODEL: ${SPONSORED_MODEL_UPSTREAM_MODEL:-}
      SPONSORED_DAILY_USER_LIMIT: ${SPONSORED_DAILY_USER_LIMIT:-5}
      SPONSORED_DAILY_GLOBAL_LIMIT: ${SPONSORED_DAILY_GLOBAL_LIMIT:-}
      SPONSORED_MAX_OUTPUT_TOKENS: ${SPONSORED_MAX_OUTPUT_TOKENS:-1024}
      SPONSORED_REQUEST_LEASE_SECONDS: ${SPONSORED_REQUEST_LEASE_SECONDS:-600}
      TZ: ${TZ}
      WORKERS: ${WORKERS}
    image: ghcr.io/finki-hub/chat-bot-api:latest
    networks:
      - finki_stack
    ports:
      - "8880:8880"
    restart: unless-stopped

  embedding-worker:
    command: ["python", "-m", "app.embedding_worker"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      disable: true
    environment:
      DATABASE_POOL_MAX_SIZE: ${DATABASE_POOL_MAX_SIZE:-10}
      DATABASE_POOL_MIN_SIZE: ${DATABASE_POOL_MIN_SIZE:-1}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      GPU_API_URL: ${GPU_API_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      TZ: ${TZ}
    image: ghcr.io/finki-hub/chat-bot-api:latest
    networks:
      - finki_stack
    restart: unless-stopped

  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      TZ: ${TZ}
    healthcheck:
      interval: 10s
      retries: 5
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER
      timeout: 5s
    image: pgvector/pgvector:pg17
    networks:
      - finki_stack
    ports:
      - "${POSTGRES_PORT}:5432"
    restart: unless-stopped
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  stream-store:
    command: valkey-server --appendonly yes
    healthcheck:
      interval: 10s
      retries: 5
      test:
        - CMD
        - valkey-cli
        - ping
      timeout: 5s
    image: valkey/valkey:8-alpine
    networks:
      - finki_stack
    restart: unless-stopped
    volumes:
      - ./valkeydata:/data

  gpu-api:
    environment:
      HF_HOME: /huggingface_cache
      LOG_LEVEL: ${LOG_LEVEL}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://eu.i.posthog.com}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      TZ: ${TZ}
    gpus: all
    image: ghcr.io/finki-hub/chat-bot-gpu-api:latest
    networks:
      - finki_stack
    ports:
      - "8888:8888"
    restart: unless-stopped
    volumes:
      - ./hf_cache:/huggingface_cache

  pgadmin:
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      TZ: ${TZ}
    image: dpage/pgadmin4:latest
    networks:
      - finki_stack
    ports:
      - "5555:80"
    restart: unless-stopped
    volumes:
      - ./pgadmin:/var/lib/pgadmin

  web:
    depends_on:
      api:
        condition: service_started
      stream-store:
        condition: service_healthy
    environment:
      API_BASE_URL: ${WEB_API_BASE_URL:-http://api:8880}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_MICROSOFT_ENTRA_ID_ID: ${AUTH_MICROSOFT_ENTRA_ID_ID:-}
      AUTH_MICROSOFT_ENTRA_ID_ISSUER: ${AUTH_MICROSOFT_ENTRA_ID_ISSUER:-}
      AUTH_MICROSOFT_ENTRA_ID_SECRET: ${AUTH_MICROSOFT_ENTRA_ID_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_URL: ${AUTH_URL:?AUTH_URL is required}
      CHAT_API_KEY: ${API_KEY:?API_KEY is required}
      RESUMABLE_STREAM_REDIS_URL: ${RESUMABLE_STREAM_REDIS_URL:-redis://stream-store:6379}
      TZ: ${TZ}
    image: ghcr.io/finki-hub/chat-bot-web:latest
    networks:
      - finki_stack
    ports:
      - "3000:3000"
    restart: unless-stopped
