name: Linters (Web)

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tsc:
    uses: finki-hub/.github/.github/workflows/tsc.yaml@766c1cef1421fc3fe4794d9fc000f47e6d34d43d # main
    with:
      working-directory: ./web

  eslint:
    uses: finki-hub/.github/.github/workflows/eslint.yaml@766c1cef1421fc3fe4794d9fc000f47e6d34d43d # main
    with:
      working-directory: ./web
