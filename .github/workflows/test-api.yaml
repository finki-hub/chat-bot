name: Tests (API)

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    uses: finki-hub/.github/.github/workflows/pytest.yaml@main
    with:
      working-directory: ./api
      python-version: "3.14"
      sync-args: --frozen
      pytest-args: -q
    secrets: inherit
