name: Tests (API)

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    uses: finki-hub/.github/.github/workflows/pytest.yaml@main
    with:
      working-directory: ./api
      sync-args: --frozen
      pytest-args: -q

  postgres-integration:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: api_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d api_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
        working-directory: ./api
      - run: uv run pytest tests/integration -q
        working-directory: ./api
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/api_test
