name: finki-hub-chat-bot-dev

networks:
  finki_stack_dev:
    driver: bridge
    name: finki_stack_dev
    # Set external to true to use an existing network
    # external: true

services:
  api:
    build:
      context: ./api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      API_KEY: ${API_KEY}
      CHAT_HISTORY_MAX_TURNS: ${CHAT_HISTORY_MAX_TURNS:-10}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      DATABASE_POOL_MAX_SIZE: ${DATABASE_POOL_MAX_SIZE:-10}
      DATABASE_POOL_MIN_SIZE: ${DATABASE_POOL_MIN_SIZE:-1}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_BASE_URL: ${GOOGLE_BASE_URL:-}
      GPU_API_URL: ${GPU_API_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      MCP_API_KEY: ${MCP_API_KEY:-}
      MCP_HTTP_URLS: ${MCP_HTTP_URLS:-}
      MCP_SERVERS: ${MCP_SERVERS:-[]}
      MCP_SSE_URLS: ${MCP_SSE_URLS:-}
      OLLAMA_URL: ${OLLAMA_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://eu.i.posthog.com}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      RERANKER_MIN_SCORE: ${RERANKER_MIN_SCORE:-0.1}
      SOURCE_RERANKER_MIN_SCORE: ${SOURCE_RERANKER_MIN_SCORE:-0.3}
      TZ: ${TZ}
      WORKERS: ${WORKERS}
    image: finki-hub/chat-bot-api:latest
    networks:
      - finki_stack_dev
    ports:
      - "8880:8880"
    pull_policy: never
    restart: unless-stopped

  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      TZ: ${TZ}
    healthcheck:
      interval: 10s
      retries: 5
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER
      timeout: 5s
    image: pgvector/pgvector:pg17
    networks:
      - finki_stack_dev
    ports:
      - ${POSTGRES_PORT}:5432
    restart: unless-stopped
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  stream-store:
    image: valkey/valkey:8-alpine
    command: valkey-server --appendonly yes
    healthcheck:
      interval: 10s
      retries: 5
      test:
        - CMD
        - valkey-cli
        - ping
      timeout: 5s
    networks:
      - finki_stack_dev
    restart: unless-stopped
    volumes:
      - ./valkeydata:/data

  gpu-api:
    build:
      context: ./gpu-api
    environment:
      HF_HOME: /huggingface_cache
      LOG_LEVEL: ${LOG_LEVEL}
      POSTHOG_HOST: ${POSTHOG_HOST:-https://eu.i.posthog.com}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      PRELOAD_BGEM3: ${PRELOAD_BGEM3}
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      TZ: ${TZ}
    gpus: all
    image: finki-hub/chat-bot-gpu-api:latest
    networks:
      - finki_stack_dev
    ports:
      - "8888:8888"
    pull_policy: never
    restart: unless-stopped
    volumes:
      - ./hf_cache:/huggingface_cache

  pgadmin:
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      TZ: ${TZ}
    image: dpage/pgadmin4:latest
    networks:
      - finki_stack_dev
    ports:
      - "5550:80"
    restart: unless-stopped
    volumes:
      - ./pgadmin:/var/lib/pgadmin

  web:
    build:
      context: ./web
    depends_on:
      api:
        condition: service_started
      stream-store:
        condition: service_healthy
    environment:
      API_BASE_URL: ${WEB_API_BASE_URL:-http://api:8880}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_MICROSOFT_ENTRA_ID_ID: ${AUTH_MICROSOFT_ENTRA_ID_ID:-}
      AUTH_MICROSOFT_ENTRA_ID_ISSUER: ${AUTH_MICROSOFT_ENTRA_ID_ISSUER:-}
      AUTH_MICROSOFT_ENTRA_ID_SECRET: ${AUTH_MICROSOFT_ENTRA_ID_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      CHAT_API_KEY: ${API_KEY}
      RESUMABLE_STREAM_REDIS_URL: ${RESUMABLE_STREAM_REDIS_URL:-redis://stream-store:6379}
      TZ: ${TZ}
    image: finki-hub/chat-bot-web:latest
    networks:
      - finki_stack_dev
    ports:
      - "3000:3000"
    pull_policy: never
    restart: unless-stopped
